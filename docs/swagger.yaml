basePath: /tintuc/api/v1
definitions:
  models.News:
    properties:
      _id:
        type: string
      author:
        type: string
      code:
        type: string
      content:
        type: string
      createUser:
        type: string
      createdAt:
        type: integer
      description:
        type: string
      publishOnMain:
        type: integer
      publishedDate:
        type: integer
      releatedLink:
        type: string
      rowStatus:
        type: integer
      rowStatusTst:
        type: integer
      tags:
        items:
          type: string
        type: array
      thumbnail:
        type: string
      title:
        type: string
      updateAt:
        type: integer
      updateUser:
        type: string
    required:
    - code
    - content
    - description
    - tags
    - title
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server celler server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Swagger News API
  version: "1.0"
paths:
  /:
    get:
      description: get all news
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.News'
            type: array
        "404":
          description: Not Found
          schema:
            type: object
      summary: Get all news
      tags:
      - News
    post:
      consumes:
      - application/json
      description: Create new news
      parameters:
      - description: News Data
        in: body
        name: news
        required: true
        schema:
          $ref: '#/definitions/models.News'
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            type: object
        "500":
          description: Internal Server Error
          schema:
            type: object
      summary: Create new news based on paramters
      tags:
      - News
  /{id}:
    get:
      description: get news by ID
      parameters:
      - description: News ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.News'
        "400":
          description: Bad Request
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
      summary: Get one news
      tags:
      - News
securityDefinitions:
  BasicAuth:
    type: basic
swagger: "2.0"
